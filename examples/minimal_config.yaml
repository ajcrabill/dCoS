# Minimal dCoS Configuration - Get Started Fast
# Copy this to config/dcos_config.yaml and fill in YOUR values

executor_backends:
  ollama:
    enabled: true

backend_defaults:
  llm: "ollama"
  embeddings: "ollama"

preferences_schema:

  user_context:
    user_name: "Your Name"
    role_title: "Your Job Title"
    primary_email: "you@example.com"
    time_zone: "America/Chicago"

  email_preferences:
    email_triage_mode: draft_all
    auto_categories: ["action_required", "fyi"]

  calendar_preferences:
    max_meetings_per_day: 6

  autonomy_preferences:
    autonomy_level: conservative

  system_preferences:
    vault_location: "/Users/yourname/Documents/Obsidian Vault"
    database_location: "./state/chief_of_staff.sqlite"
    executor_backend: "ollama"
    privacy_strictness: "balanced"

# That's it. Everything else will use defaults.
