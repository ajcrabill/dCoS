# Digital Chief of Staff Configuration File
# This is the ONLY configuration file you need to edit

# LLM Backend Configuration
executor_backends:
  ollama:
    enabled: true
    type: "local"
    endpoint: "http://localhost:11434"
    model: "mistral"
    temperature: 0.7
    max_tokens: 500
    setup: "ollama pull mistral"

  mlx:
    enabled: false
    type: "local"
    model: "mlx-community/Mistral-7B-Instruct-v0.1"
    setup: "pip install mlx mlx-lm"

  claude:
    enabled: false
    type: "cloud"
    model: "claude-3-5-sonnet"
    api_key_env: "CLAUDE_API_KEY"

embeddings:
  ollama:
    enabled: true
    model: "nomic-embed-text"

backend_defaults:
  llm: "ollama"
  embeddings: "ollama"

# User Preferences Schema
preferences_schema:

  user_context:
    user_name:
      type: string
      label: "Your Name"
      required: true
      example: "Jane Smith"

    role_title:
      type: string
      label: "Your Job Title"
      example: "VP of Product"

    primary_email:
      type: email
      label: "Your Email"
      required: true
      example: "jane@example.com"

    time_zone:
      type: timezone
      label: "Your Timezone"
      default: "America/Chicago"
      example: "America/Los_Angeles"

    operating_values:
      type: list[string]
      label: "Your Core Values (3-5)"
      example: ["Innovation", "Transparency", "Learning"]

  time_management:
    weekly_hours_to_protect:
      type: integer
      label: "Deep Work Hours/Week"
      default: 10
      description: "Hours you need for focused work"

    deep_work_preferences:
      type: object
      label: "Deep Work Time Blocks"
      fields:
        preferred_days: {type: list[int], label: "Days (0=Sun, 6=Sat)", example: "[1, 2, 3, 4, 5]"}
        preferred_time: {type: string, label: "Time range", example: "09:00-11:00"}
        no_meetings_before: {type: string, label: "No meetings before", example: "09:00"}

  email_preferences:
    email_triage_mode:
      type: enum
      label: "Email Draft Mode"
      values: [draft_all, draft_important, smart_label]
      default: draft_all
      description: "draft_all=draft every email, draft_important=important only, smart_label=auto-categorize"

    auto_categories:
      type: list[string]
      label: "Email Categories"
      example: ["leads", "invoices", "action_required", "fyi"]

  calendar_preferences:
    calendar_triage_enabled:
      type: boolean
      label: "Triage Calendar Invites"
      default: true

    meeting_buffer_minutes:
      type: integer
      label: "Minutes Between Meetings"
      default: 15

    max_meetings_per_day:
      type: integer
      label: "Max Meetings/Day"
      default: 6

  relationship_preferences:
    key_people:
      type: list[email]
      label: "Key People (managers, reports, etc)"
      example: ["sarah@company.com", "bob@company.com"]

    contact_frequency_days:
      type: object
      label: "Contact Frequency (days)"
      fields:
        manager: {type: integer, default: 3}
        direct_reports: {type: integer, default: 2}
        peers: {type: integer, default: 5}
        clients: {type: integer, default: 7}

  autonomy_preferences:
    autonomy_level:
      type: enum
      label: "Initial Autonomy"
      values: [conservative, balanced, aggressive]
      default: conservative
      description: "conservative=approve all, balanced=auto some, aggressive=mostly auto"

    failure_mode:
      type: enum
      label: "When Uncertain"
      values: [draft_only, ask_first, just_do_it]
      default: draft_only

  workflow_preferences:
    enable_daily_digest:
      type: boolean
      label: "Daily Digest"
      default: true

    daily_digest_time:
      type: time
      label: "Digest Time"
      default: "08:00"

    enable_weekly_review:
      type: boolean
      label: "Weekly Review"
      default: true

    weekly_review_day:
      type: enum
      label: "Review Day"
      values: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday]
      default: Friday

  system_preferences:
    vault_location:
      type: path
      label: "Obsidian Vault Path"
      required: true
      example: "/Users/jane/Documents/Obsidian Vault"
      description: "Absolute path to your Obsidian vault"

    database_location:
      type: path
      label: "Database Location"
      default: "./state/chief_of_staff.sqlite"

    executor_backend:
      type: enum
      label: "LLM Backend"
      values: [ollama, mlx, claude]
      default: ollama
      description: "Which backend to use for decisions"

    privacy_strictness:
      type: enum
      label: "Privacy Level"
      values: [strict, balanced, permissive]
      default: balanced
      description: "How aggressive to redact sensitive data"

  advanced_settings:
    never_autonomous_send_to:
      type: list[email]
      label: "Never Auto-Send To"
      description: "Addresses that always require manual approval"
      example: ["your.boss@company.com", "@important-client.com"]

    learning_rules_enabled:
      type: boolean
      label: "Learn from Corrections"
      default: true

    vault_indexing_enabled:
      type: boolean
      label: "Index Vault for Search"
      default: true
